<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pranam</title>
    <link rel="stylesheet" href="pranam.css" />
  </head>

  <body class="intro page-fade" style="background-color: #afe2fd">
    <nav>
      <div class="home-btn">
        <a href="index.html">
          <img src="./assets/images/home-btn.png" alt="Home" />
        </a>
        <span class="home-label" data-lang-key="homeTooltip">Home</span>
      </div>

      <div class="navbar-language">
        <div class="english-button">E</div>
        <div class="hindi-button">H</div>
        <div class="gujrati-button">G</div>
      </div>
    </nav>

    <div class="pranam-container">
      <img
        class="pranam-container-img"
        src="./assets/images/pranam-container.png"
        alt=""
      />
      <img class="pranam-img" src="./assets/images/pranam.png" alt="" />
    </div>

    <div class="pages">
      <a class="num num1" href="destroying-environment.html">
        <img src="./assets/images/circle.png" alt="" data-tip="destroy" />
        <span data-lang-key="num.1">1</span>
      </a>

      <a class="num num2" href="benefit-nature.html">
        <img src="./assets/images/circle.png" alt="" data-tip="nature" />
        <span data-lang-key="num.2">2</span>
      </a>

      <a class="num num3" href="save-environment.html">
        <img src="./assets/images/circle.png" alt="" data-tip="save" />
        <span data-lang-key="num.3">3</span>
      </a>
    </div>

    <div class="tooltip-content" hidden>
      <div id="destroy" data-lang-key="page.destroy">
        How are we destroying Environment?
      </div>
      <div id="nature" data-lang-key="page.nature">
        what do we benefit from the Nature?
      </div>
      <div id="save" data-lang-key="page.save">
        How can we Save Environment?
      </div>
    </div>

    <div id="pageTooltip" class="page-tooltip" aria-hidden="true">
      <span class="tooltip-text"></span>
    </div>

    <!-- Language button hover audio only -->
    <audio id="languageHoverAudio" preload="auto">
      <source src="./assets/audio/pop.mp3" type="audio/mpeg" />
    </audio>

    <!-- Language button click audio -->
    <audio id="englishAudio" preload="auto">
      <source src="./assets/audio/Eng.mpeg" type="audio/mpeg" />
    </audio>

    <audio id="hindiAudio" preload="auto">
      <source src="./assets/audio/Hindi.mpeg" type="audio/mpeg" />
    </audio>

    <audio id="gujratiAudio" preload="auto">
      <source src="./assets/audio/Gujarati.mpeg" type="audio/mpeg" />
    </audio>

    <script>
      (() => {
        const LANG_KEY = "selectedLanguage";
        const DEFAULT_LANG = "English";
        let translations = null;

        async function loadTranslations() {
          if (translations) return translations;

          try {
            const res = await fetch("/JSON/data.json");
            if (!res.ok) throw new Error("JSON not found");
            translations = await res.json();
          } catch (err) {
            console.error("Translation load failed:", err);
            translations = {};
          }

          return translations;
        }

        function setActiveUI(lang) {
          const container = document.querySelector(".navbar-language");
          if (!container) return;

          container.classList.remove("lang-left", "lang-right", "lang-middle");

          if (lang === "English") {
            container.classList.add("lang-left");
          } else if (lang === "Gujarati") {
            container.classList.add("lang-right");
          } else if (lang === "Hindi") {
            container.classList.add("lang-middle");
          }

          document.querySelectorAll(".navbar-language > div").forEach((btn) => {
            btn.classList.remove("lang-active");
          });

          const mapBtn = {
            English: ".english-button",
            Hindi: ".hindi-button",
            Gujarati: ".gujrati-button",
          };

          document.querySelector(mapBtn[lang])?.classList.add("lang-active");
        }

        function applyLanguage(lang) {
          if (!translations || !translations[lang]) {
            lang = DEFAULT_LANG;
          }

          document.documentElement.setAttribute("lang", lang);

          document.body.setAttribute(
            "data-lang",
            lang === "Hindi" ? "hi" : lang === "Gujarati" ? "gu" : "en",
          );

          setActiveUI(lang);

          if (!translations || !translations[lang]) return;

          document.querySelectorAll("[data-lang-key]").forEach((el) => {
            if (el.children.length > 0) return;

            const key = el.getAttribute("data-lang-key");
            const value = translations[lang][key];

            if (value == null) return;

            if (String(value).includes("<br")) {
              el.innerHTML = value;
            } else {
              el.textContent = value;
            }
          });

          localStorage.setItem(LANG_KEY, lang);
        }

        function playAudio(audio) {
          if (!audio) return;

          audio.pause();
          audio.currentTime = 0;

          audio.play().catch((err) => {
            console.log("Audio play blocked:", err);
          });
        }

        function stopAudio(audio) {
          if (!audio) return;

          audio.pause();
          audio.currentTime = 0;
        }

        function addLanguageButtonAudio(button, lang, languageAudio) {
          if (!button) return;

          /*
      pop.mp3 only on hover.
      It will not play during click.
    */
          button.addEventListener("mouseenter", (e) => {
            if (e.buttons !== 0) return;
            playAudio(document.getElementById("languageHoverAudio"));
          });

          /*
      Stop pop.mp3 immediately when press starts.
      This prevents pop.mp3 from being heard on click.
    */
          button.addEventListener("pointerdown", () => {
            stopAudio(document.getElementById("languageHoverAudio"));
          });

          /*
      On click, only selected language audio will play.
    */
          button.addEventListener("click", () => {
            const hoverAudio = document.getElementById("languageHoverAudio");

            stopAudio(hoverAudio);
            playAudio(languageAudio);
            applyLanguage(lang);
          });
        }

        function addHomeButtonHoverAudio() {
          const homeBtn = document.querySelector(".home-btn a");
          const hoverAudio = document.getElementById("languageHoverAudio");

          if (!homeBtn) return;

          /*
      pop.mp3 on home button hover only.
    */
          homeBtn.addEventListener("mouseenter", (e) => {
            if (e.buttons !== 0) return;
            playAudio(hoverAudio);
          });

          /*
      Stop pop.mp3 immediately on click/press.
    */
          homeBtn.addEventListener("pointerdown", () => {
            stopAudio(hoverAudio);
          });
        }

        async function initLang() {
          await loadTranslations();

          const savedLang = localStorage.getItem(LANG_KEY);
          const currentLang =
            savedLang && translations[savedLang] ? savedLang : DEFAULT_LANG;

          applyLanguage(currentLang);

          const englishBtn = document.querySelector(".english-button");
          const hindiBtn = document.querySelector(".hindi-button");
          const gujratiBtn = document.querySelector(".gujrati-button");

          const englishAudio = document.getElementById("englishAudio");
          const hindiAudio = document.getElementById("hindiAudio");
          const gujratiAudio = document.getElementById("gujratiAudio");

          addLanguageButtonAudio(englishBtn, "English", englishAudio);
          addLanguageButtonAudio(hindiBtn, "Hindi", hindiAudio);
          addLanguageButtonAudio(gujratiBtn, "Gujarati", gujratiAudio);

          /*
      Home button hover audio added here.
    */
          addHomeButtonHoverAudio();

          window.setLanguage = applyLanguage;
        }

        document.addEventListener("DOMContentLoaded", initLang);
      })();

      /* ==============================
   TOOLTIP
============================== */

      document.addEventListener("DOMContentLoaded", () => {
        const tooltip = document.getElementById("pageTooltip");
        const tooltipText = tooltip?.querySelector(".tooltip-text");

        if (!tooltip || !tooltipText) return;

        const tooltipColors = {
          destroy: "rgba(173, 147, 197, 0.65)",
          nature: "rgba(250, 162, 44, 0.65)",
          save: "rgba(246, 157, 155, 0.65)",
        };

        function placeTooltipToIcon(link) {
          const rect = link.getBoundingClientRect();
          const topVH =
            ((rect.top + rect.height / 2) / window.innerHeight) * 99;

          tooltip.style.top = `${topVH}vh`;
          tooltip.style.right = `1vw`;
          tooltip.style.left = `auto`;
        }

        document.querySelectorAll(".pages a").forEach((link) => {
          link.addEventListener("mouseenter", () => {
            const tipId = link.querySelector("img")?.dataset.tip;
            const source = document.getElementById(tipId);

            if (!source) return;

            tooltipText.textContent = source.textContent;
            tooltip.style.background =
              tooltipColors[tipId] || "rgba(96, 97, 159, 0.75)";

            placeTooltipToIcon(link);

            tooltip.classList.remove("show");
            void tooltip.offsetWidth;
            tooltip.classList.add("show");
          });

          link.addEventListener("mouseleave", () => {
            tooltip.classList.remove("show");
          });
        });

        window.addEventListener("resize", () => {
          if (!tooltip.classList.contains("show")) return;

          const active = document.querySelector(".pages a:hover");
          if (active) placeTooltipToIcon(active);
        });
      });
    </script>
  </body>
</html>
